name: Bug report
description: Report a reproducible problem in GMode.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Versions
      description: Paste the command output for each relevant tool.
      value: |
        gmode --version:
        wrangler --version:
        node --version:
        package manager:
    validations:
      required: true
